name: Build Project Mutu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install Capacitor
      - name: Install dependencies
        run: npm install

      # ── 6. Copy web files into www/ folder
      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp service-worker.js www/
          cp -r audio www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true

      # ── 7. Write capacitor.config.json pointing to www
      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.funkuniverse.mutu",
            "appName": "Project Mutu",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "backgroundColor": "#000000"
            }
          }
          EOF

      # ── 8. Add Android platform
      - name: Add Android platform
        run: npx cap add android

      # ── 9. Sync web files into Android project
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Make gradlew executable
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # ── 11. Build debug APK
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      # ── 12. Rename APK
      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk Project-Mutu.apk

      # ── 13. Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Project-Mutu-APK
          path: Project-Mutu.apk

      # ── 14. Create Release
      - name: Get release tag
        id: date
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.tag }}
          name: "Project Mutu ${{ steps.date.outputs.tag }}"
          body: |
            ## Project Mutu
            Download the APK below and install it on Android.
            > Enable "Install from unknown sources" in your Android settings before installing.
          files: Project-Mutu.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
