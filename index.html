<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Project Mutu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Creepster&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --bubble-user: #1a1a2e;
      --bubble-bot: #111111;
      --text: #c8c8c8;
      --text-dim: #555;
      --accent: #cc0000;
      --glow: rgba(204, 0, 0, 0.15);
      --border: #1f1f1f;
      --font-main: 'Share Tech Mono', monospace;
      --font-display: 'Special Elite', cursive;
      --font-horror: 'Creepster', cursive;
      --flicker-speed: 0s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      overflow: hidden;
      user-select: none;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
      opacity: 0.4;
    }

    /* ── SCANLINES ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 9998;
    }

    /* ══════════════════════════════════════
       BOOT SCREEN
    ══════════════════════════════════════ */
    #boot-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      z-index: 1000;
      gap: 32px;
    }

    .boot-title {
      font-family: var(--font-horror);
      font-size: clamp(3rem, 12vw, 6rem);
      color: var(--accent);
      text-shadow: 0 0 40px rgba(204,0,0,0.8), 0 0 80px rgba(204,0,0,0.4);
      animation: titlePulse 3s ease-in-out infinite;
      letter-spacing: 4px;
    }

    .boot-subtitle {
      font-family: var(--font-display);
      font-size: clamp(0.7rem, 3vw, 1rem);
      color: #333;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .boot-enter {
      margin-top: 20px;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid #cc0000;
      color: #cc0000;
      font-family: var(--font-main);
      font-size: 0.9rem;
      letter-spacing: 4px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
      animation: borderFlicker 4s infinite;
    }
    .boot-enter:hover { background: rgba(204,0,0,0.1); box-shadow: 0 0 20px rgba(204,0,0,0.3); }

    /* ══════════════════════════════════════
       LANGUAGE SCREEN
    ══════════════════════════════════════ */
    #lang-screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 900;
      gap: 16px;
      padding: 24px;
    }

    .lang-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 320px;
    }

    .lang-btn {
      padding: 14px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-main);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .lang-btn:hover { border-color: #444; background: #1a1a1a; }

    /* ══════════════════════════════════════
       CHAT SCREEN
    ══════════════════════════════════════ */
    #chat-screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      background: var(--bg);
      transition: background 2s ease;
    }

    /* Header */
    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .header-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #cc0000;
      animation: pulse 2s infinite;
    }

    .header-name {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text);
      letter-spacing: 2px;
    }

    .header-status {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-left: auto;
      letter-spacing: 1px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 2px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #222; }

    .msg {
      max-width: 82%;
      padding: 12px 16px;
      font-size: 0.88rem;
      line-height: 1.6;
      animation: msgFadeIn 0.4s ease forwards;
      opacity: 0;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 0 12px 12px 12px;
      color: var(--text);
    }

    .msg.user {
      align-self: flex-end;
      background: var(--bubble-user);
      border: 1px solid #1a1a3a;
      border-radius: 12px 0 12px 12px;
      color: #8888cc;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      border: none;
      color: #2a2a2a;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 0;
    }

    .msg.red {
      color: #cc4444;
      border-color: #2a0000;
      background: #0d0000;
    }

    /* Typing indicator */
    #typing {
      align-self: flex-start;
      padding: 14px 18px;
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 0 12px 12px 12px;
      display: none;
    }

    .typing-dots {
      display: flex; gap: 5px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      background: #444;
      border-radius: 50%;
      animation: typingDot 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Input area */
    #input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    /* Text input for name/age */
    #text-input-wrap {
      display: none;
      gap: 10px;
      align-items: center;
    }

    #text-input {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid #222;
      color: var(--text);
      font-family: var(--font-main);
      font-size: 0.88rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    #text-input:focus { border-color: #333; }
    #text-input::placeholder { color: #333; }

    #send-btn {
      padding: 12px 20px;
      background: transparent;
      border: 1px solid #222;
      color: #555;
      font-family: var(--font-main);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    #send-btn:hover { border-color: #555; color: var(--text); }

    /* Yes/No buttons */
    #yn-wrap {
      display: none;
      gap: 12px;
    }

    .yn-btn {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-main);
      font-size: 0.9rem;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
    }
    .yn-btn:hover { color: var(--text); }
    .yn-btn.yes:hover { border-color: #cc0000; color: #cc0000; background: rgba(204,0,0,0.05); }
    .yn-btn.no:hover { border-color: #444; }

    /* ══════════════════════════════════════
       DEATH REVEAL SCREEN
    ══════════════════════════════════════ */
    #reveal-screen {
      position: fixed; inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 800;
      padding: 32px;
      text-align: center;
    }

    .reveal-entity {
      font-family: var(--font-horror);
      font-size: clamp(1rem, 5vw, 1.6rem);
      color: #1a0000;
      letter-spacing: 3px;
      margin-bottom: 48px;
      animation: revealFade 3s ease forwards;
    }

    .reveal-date-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: #2a0000;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 20px;
      animation: revealFade 3s ease 2s forwards;
      opacity: 0;
    }

    .reveal-date {
      font-family: var(--font-horror);
      font-size: clamp(2.5rem, 10vw, 5rem);
      color: #cc0000;
      text-shadow: 0 0 60px rgba(204,0,0,0.9), 0 0 120px rgba(204,0,0,0.4);
      animation: dateReveal 1s ease 4s forwards;
      opacity: 0;
      letter-spacing: 2px;
    }

    .reveal-age-line {
      margin-top: 16px;
      font-family: var(--font-main);
      font-size: 0.8rem;
      color: #330000;
      letter-spacing: 3px;
      animation: revealFade 2s ease 5.5s forwards;
      opacity: 0;
    }

    /* ══════════════════════════════════════
       RETURN SCREEN
    ══════════════════════════════════════ */
    #return-screen {
      position: fixed; inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      padding: 32px;
      text-align: center;
      gap: 24px;
    }

    .return-eye {
      font-size: 3rem;
      animation: eyePulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(204,0,0,0.8));
    }

    .return-text {
      font-family: var(--font-horror);
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: #cc0000;
      letter-spacing: 2px;
      line-height: 1.5;
      text-shadow: 0 0 30px rgba(204,0,0,0.6);
    }

    .return-date {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      color: #fff;
      letter-spacing: 4px;
      margin-top: 8px;
    }

    .return-sub {
      font-family: var(--font-main);
      font-size: 0.7rem;
      color: #2a2a2a;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 32px;
    }

    /* ══════════════════════════════════════
       OUTRO (BLACK SCREEN WITH BEEP)
    ══════════════════════════════════════ */
    #outro-screen {
      position: fixed; inset: 0;
      background: #000;
      display: none;
      z-index: 900;
    }

    /* ══════════════════════════════════════
       GLITCH OVERLAY
    ══════════════════════════════════════ */
    #glitch-overlay {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 9997;
      display: none;
    }

    /* ══════════════════════════════════════
       DARK PHASE TRANSITIONS
    ══════════════════════════════════════ */
    .phase-1 { --bg: #080808; --surface: #0d0d0d; --text: #b0b0b0; --border: #1a1a1a; }
    .phase-2 { --bg: #050505; --surface: #0a0a0a; --text: #888; --border: #151515; }
    .phase-3 { --bg: #030303; --surface: #080808; --text: #666; --border: #111; }
    .phase-4 { --bg: #010101; --surface: #050505; --text: #cc3333; --border: #0d0000; --bubble-bot: #0a0000; --border: #1a0000; }

    /* ══════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════ */
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 40px rgba(204,0,0,0.8), 0 0 80px rgba(204,0,0,0.4); }
      50% { text-shadow: 0 0 20px rgba(204,0,0,0.4), 0 0 40px rgba(204,0,0,0.2); }
    }

    @keyframes borderFlicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.3; }
      97% { opacity: 1; }
      98% { opacity: 0.1; }
      99% { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }

    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes revealFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes dateReveal {
      0% { opacity: 0; transform: scale(0.8); filter: blur(20px); }
      60% { opacity: 1; transform: scale(1.05); filter: blur(0); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    @keyframes eyePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes screenShake {
      0%, 100% { transform: translate(0,0); }
      10% { transform: translate(-4px, 2px); }
      20% { transform: translate(4px, -2px); }
      30% { transform: translate(-2px, 4px); }
      40% { transform: translate(3px, -3px); }
      50% { transform: translate(-3px, 1px); }
    }

    @keyframes glitchLine {
      0% { top: 0%; opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .glitch-active {
      animation: screenShake 0.4s ease;
    }

    /* ── DISCLAIMER ── */
    .disclaimer {
      position: fixed;
      bottom: 8px; left: 0; right: 0;
      text-align: center;
      font-size: 0.55rem;
      color: #1a1a1a;
      letter-spacing: 1px;
      z-index: 9996;
      pointer-events: none;
    }
  </style>
</head>

      <button class="lang-btn" onclick="selectLang('id')">🇮🇩 Indonesia</button>

  <!-- ══ CHAT SCREEN ══ -->
  <div id="chat-screen">

  <!-- ══ REVEAL SCREEN ══ -->

    <div class="reveal-date" id="reveal-date"></div>
    <div class="reveal-age-line" id="reveal-age"></div>
  </div>

  <!-- ══ OUTRO (BLACKOUT + BEEP) ══ -->
  <div id="outro-screen"></div>

  <!-- ══ RETURN SCREEN ══ -->
  <div id="return-screen">
    <div class="return-eye">👁</div>
    <div class="return-text" id="return-text"></div>
    <div class="return-date" id="return-date-display"></div>
    <div class="return-sub" id="return-sub"></div>
  </div>

  <!-- GLITCH OVERLAY -->
  <div id="glitch-overlay"></div>

  <!-- AUDIO -->
  <audio id="audio-laugh" preload="auto">
    <source src="audio/laugh.mp3" type="audio/mpeg" />
  </audio>
  <audio id="audio-beep" preload="auto" loop>

  </audio>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let lang = 'en';
let t = T.en;
let step = 0;
let userData = {};
let phase = 0;

const PHASES = [0, 3, 6, 9, 12]; // question indices that trigger phase shifts

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
window.onload = () => {
  // Check if user has already played
  const saved = localStorage.getItem('mutu_death');
  if (saved) {
    const data = JSON.parse(saved);
    showReturnScreen(data);
    return;
  }
};

function startLangScreen() {
  document.getElementById('boot-screen').style.display = 'none';
  document.getElementById('lang-screen').style.display = 'flex';
}

function selectLang(l) {
  lang = l;
  t = T[l];
  document.getElementById('lang-screen').style.display = 'none';
  startChat();
}

// ══════════════════════════════════════════════
//  CHAT ENGINE
// ══════════════════════════════════════════════
const chatScreen = document.getElementById('chat-screen');
const messagesEl = document.getElementById('messages');
const typingEl   = document.getElementById('typing');
const textWrap   = document.getElementById('text-input-wrap');
const ynWrap     = document.getElementById('yn-wrap');
const textInput  = document.getElementById('text-input');
const headerStatus = document.getElementById('header-status');

function startChat() {
  chatScreen.style.display = 'flex';
  step = 0;
  nextStep();
}

// Question flow definition
function getQuestions() {
  return [
    { type: 'text',   key: 'name',    msg: t.q_name },
    { type: 'text',   key: 'dob',     msg: t.q_dob },
    { type: 'text',   key: 'city',    msg: t.q_city },
    { type: 'system', key: null,      msg: t.sys_shift },
    { type: 'yn',     key: 'parents', msg: t.q_parents },
    { type: 'yn',     key: 'mom',     msg: t.q_mom },
    { type: 'yn',     key: 'dad',     msg: t.q_dad },
    { type: 'cry',    key: 'cry',     msg: t.q_cry },
    { type: 'yn',     key: 'problem', msg: t.q_problem },
    { type: 'yn',     key: 'ten_min', msg: t.q_10min },
    { type: 'yn',     key: 'pain',    msg: t.q_pain },
    { type: 'yn',     key: 'hate',    msg: t.q_hate },
    { type: 'yn',     key: 'threat',  msg: t.q_threat },
    { type: 'yn',     key: 'guilt',   msg: t.q_guilt },
    { type: 'yn',     key: 'camera',  msg: t.q_camera },
    { type: 'yn',     key: 'reflect', msg: t.q_reflection },
    { type: 'yn',     key: 'alone',   msg: t.q_alone },
    { type: 'yn',     key: 'decide',  msg: t.q_decision },
    { type: 'yn',     key: 'legal',   msg: t.q_legal.replace('{name}', userData.name || '') },
    { type: 'yn',     key: 'death',   msg: t.q_death },
  ];
}

function nextStep() {
  const questions = getQuestions();
  if (step >= questions.length) return;

  const q = questions[step];
  const delay = step === 0 ? 800 : 1200;

  // Phase shift check
  checkPhase(step);

  showTyping(delay, () => {
    if (q.type === 'system') {
      addMessage(q.msg, 'system');
      step++;
      setTimeout(nextStep, 600);
      return;
    }
    addMessage(q.msg, q.type === 'yn' ? (phase >= 3 ? 'bot red' : 'bot') : 'bot');
    showInput(q.type);
  });
}

function checkPhase(s) {
  const newPhase = s < 4 ? 0 : s < 8 ? 1 : s < 12 ? 2 : s < 16 ? 3 : 4;
  if (newPhase > phase) {
    phase = newPhase;
    applyPhase(phase);
  }
}

function applyPhase(p) {
  chatScreen.className = '';
  chatScreen.style.display = 'flex';
  if (p === 1) { chatScreen.classList.add('phase-1'); headerStatus.textContent = t.header_shift; }
  if (p === 2) { chatScreen.classList.add('phase-2'); triggerGlitch(); }
  if (p === 3) { chatScreen.classList.add('phase-3'); triggerGlitch(); }
  if (p === 4) { chatScreen.classList.add('phase-4'); triggerGlitch(); }
}

function showTyping(duration, cb) {
  typingEl.style.display = 'block';
  scrollDown();
  setTimeout(() => {
    typingEl.style.display = 'none';
    cb();
  }, duration);
}

function addMessage(text, cls) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.style.whiteSpace = 'pre-line';
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollDown();
}

function scrollDown() {
  setTimeout(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, 50);
}

function showInput(type) {
  textWrap.style.display = 'none';
  ynWrap.style.display = 'none';

  if (type === 'text') {
    textWrap.style.display = 'flex';
    textInput.value = '';
    textInput.focus();
  } else if (type === 'yn') {
    ynWrap.style.display = 'flex';
  } else if (type === 'cry') {
    // Show multiple choice as styled buttons
    showCryOptions();
  }
}

function showCryOptions() {
  const ynW = document.getElementById('yn-wrap');
  ynW.style.display = 'none';
  textWrap.style.display = 'none';

  // Build cry option buttons dynamically
  const existing = document.getElementById('cry-options');
  if (existing) existing.remove();

  const wrap = document.createElement('div');
  wrap.id = 'cry-options';
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

  t.cry_answers.forEach(ans => {
    const btn = document.createElement('button');
    btn.className = 'yn-btn';
    btn.style.cssText = 'letter-spacing:1px;font-size:0.78rem;text-align:left;padding:10px 14px;';
    btn.textContent = ans;
    btn.onclick = () => {
      wrap.remove();
      addMessage(ans, 'user');
      userData.cry = ans;
      step++;
      setTimeout(nextStep, 800);
    };
    wrap.appendChild(btn);
  });

  document.getElementById('input-area').prepend(wrap);
}

// ──────────────────────
//  INPUT HANDLERS
// ──────────────────────
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitText(); });

function submitText() {
  const val = textInput.value.trim();
  if (!val) return;

  const questions = getQuestions();
  const q = questions[step];

  addMessage(val, 'user');
  userData[q.key] = val;

  if (q.key === 'name') userData.name = val;

  textWrap.style.display = 'none';
  step++;
  setTimeout(nextStep, 1000);
}

function answerYN(answer) {
  const questions = getQuestions();
  const q = questions[step];

  ynWrap.style.display = 'none';
  addMessage(answer, 'user');
  userData[q.key] = answer;

  // Special: death date question
  if (q.key === 'death') {
    if (answer === 'YES' || answer === 'SIM' || answer === 'SÍ' || answer === 'हाँ' || answer === 'OUI' || answer === 'YA') {
      step++;
      setTimeout(triggerDeathReveal, 1200);
    } else {
      // They said no — still happens
      step++;
      setTimeout(() => {
        addMessage(userData.name ? `...${userData.name}.` : '...', 'bot red');
        setTimeout(triggerDeathReveal, 2000);
      }, 800);
    }
    return;
  }

  step++;
  setTimeout(nextStep, 900);
}

// ══════════════════════════════════════════════
//  DEATH DATE GENERATION
// ══════════════════════════════════════════════
function generateDeathDate(name, dob) {
  // Seed from name + dob for consistency
  let seed = 0;
  const str = (name || 'unknown') + (dob || '01/01/2000');
  for (let i = 0; i < str.length; i++) seed += str.charCodeAt(i);

  const rand = (min, max) => {
    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
    return min + Math.abs(seed % (max - min + 1));
  };

  const now = new Date();

  // Parse birth year
  let birthYear = now.getFullYear() - 20;
  if (dob) {
    const parts = dob.split('/');
    if (parts.length === 3) {
      const y = parseInt(parts[2]);
      if (y > 1900 && y < 2020) birthYear = y;
    }
  }

  const currentAge = now.getFullYear() - birthYear;
  const yearsLeft  = rand(8, 55);
  const deathYear  = now.getFullYear() + yearsLeft;
  const deathMonth = rand(1, 12);
  const deathDay   = rand(1, 28);

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  return {
    day:   deathDay,
    month: deathMonth,
    year:  deathYear,
    formatted: `${monthNames[deathMonth-1]} ${deathDay}, ${deathYear}`,
    yearsLeft,
    currentAge
  };
}

// ══════════════════════════════════════════════
//  DEATH REVEAL
// ══════════════════════════════════════════════
function triggerDeathReveal() {
  // Hide chat
  chatScreen.style.display = 'none';

  // Generate date
  const death = generateDeathDate(userData.name, userData.dob);

  // Save to localStorage
  const saveData = {
    name: userData.name,
    date: death.formatted,
    lang: lang
  };
  localStorage.setItem('mutu_death', JSON.stringify(saveData));

  // Play laugh audio
  const laugh = document.getElementById('audio-laugh');
  laugh.volume = 0.8;
  laugh.play().catch(() => {});

  // Show reveal screen
  const revealScreen = document.getElementById('reveal-screen');
  revealScreen.style.display = 'flex';

  document.getElementById('reveal-entity').textContent =
    t.reveal_entity.replace('{name}', userData.name || '');
  document.getElementById('reveal-label').textContent = t.reveal_label;
  document.getElementById('reveal-date').textContent = death.formatted;
  document.getElementById('reveal-age').textContent =
    t.reveal_age_line.replace('{age}', death.yearsLeft);

  // After reveal, start outro
  setTimeout(triggerOutro, 9000);
}

// ══════════════════════════════════════════════
//  OUTRO (BLACKOUT + BEEP + KICK)
// ══════════════════════════════════════════════
function triggerOutro() {
  document.getElementById('reveal-screen').style.display = 'none';

  const outro = document.getElementById('outro-screen');
  outro.style.display = 'block';

  // Stop laugh, start beep
  document.getElementById('audio-laugh').pause();
  const beep = document.getElementById('audio-beep');
  beep.volume = 0.6;
  beep.play().catch(() => {});

  // After 5 seconds, "kick out" — blank screen freeze
  setTimeout(() => {
    beep.pause();
    outro.style.display = 'none';
    // App appears to close — just a black frozen screen
    document.body.style.background = '#000';
    document.body.innerHTML = '';
  }, 5000);
}

// ══════════════════════════════════════════════
//  RETURN SCREEN (reopen after first play)
// ══════════════════════════════════════════════
function showReturnScreen(data) {
  const returnScreen = document.getElementById('return-screen');
  returnScreen.style.display = 'flex';

  const lt = T[data.lang || 'en'];

  document.getElementById('return-text').style.whiteSpace = 'pre-line';
  document.getElementById('return-text').textContent =
    lt.outro_return.replace('{date}', '').replace('\n\n\n', '').split('\n{date}')[0];

  document.getElementById('return-date-display').textContent = data.date;
  document.getElementById('return-sub').textContent = lt.outro_sub;
}

// ══════════════════════════════════════════════
//  GLITCH EFFECT
// ══════════════════════════════════════════════
function triggerGlitch() {
  document.body.classList.add('glitch-active');
  setTimeout(() => document.body.classList.remove('glitch-active'), 400);
}
